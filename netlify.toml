[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/admin/reset-password"
  to = "/.netlify/functions/admin-password"
  status = 200

[[redirects]]
  from = "/api/admin/delete-user"
  to = "/.netlify/functions/admin-delete-user"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
